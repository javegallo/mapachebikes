<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapache bikes - Tienda de ciclismo</title>
    <link rel="stylesheet" href="/mapacheBikes/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mouse+Memoirs&display=swap" rel="stylesheet">
  </head>
  <body>
    <header>
      <img src="./img/logoMapacheBikes.png" width="100px" alt="Logo mapache bikes">
      <h1>MAPACHE BIKES</h1>
      <h4>Tienda de bicicletas y accesorios para ciclistas</h4>
      <nav>
        <ul>
          <li>Inicio</li>
          <li><a href="./productos.html">Productos</a></li>
          <li>Contacto</li>
        </ul>
      </nav>
      <hr />
    </header>
    <main>
      <p>Tienda de cilcismo</p>
      <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/8WMtZ3BFjwU?si=SbfHTVB_ouGXcW_p"
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
      </form>
      <form action="https://formspree.io/f/mvgabwrb" method="POST">
        <label for="nombre">Nombre:</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          placeholder="Ingrese su nombre"
          required/>

        <label for="email">Mail:</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="ejemplo@mail.com"
          required/>

        <label for="mensaje">Mensaje:</label>
        <textarea
          id="mensaje"
          name="mensaje"
          rows="4"
          cols="30"
          placeholder="Ingrese su mensaje/consulta :)"
          required
        ></textarea>

        <button type="submit">Enviar</button>
      </form>
    </main>
    <footer>Desarrollado por Javier Gallo - Talento Tech 2025</footer>
  </body>
</html>
